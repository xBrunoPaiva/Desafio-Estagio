<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cliente</title>
</head>
<body>
  <h1>Cliente Padrao</h1>

  <input id="key" placeholder="Chave">
  <input id="value" placeholder="Valor">

  <br><br>

  <button onclick="sendAction('create')">Criar</button>
  <button onclick="sendAction('update')">Atualizar</button>
  <button onclick="sendAction('delete')">Deletar</button>

  <h3>Resposta:</h3>
  <pre id="response"></pre>

  <script>
    async function sendAction(action) {
      const key = document.getElementById("key").value;
      const value = document.getElementById("value").value;

      // Ali nos Headers ele define que o conteúdo é JSON
      const response = await fetch("http://127.0.0.1:5000/document", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        // Modelagem de como ficará após os requests (ficará em JSON obvio)
        body: JSON.stringify({
          action: acao,
          key: key,
          value: value
        })
      });

      const data = await response.json();
      document.getElementById("response").textContent =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
